<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHL Assessment Advisor</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --shl-blue: #005CB9;
            --shl-light-blue: #EBF4FF;
            --bg-gray: #F4F7F9;
            --text-dark: #1A202C;
            --text-muted: #718096;
            --white: #FFFFFF;
            --border: #E2E8F0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Layout */
        #root {
            height: 100%;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            background: var(--white);
            box-shadow: var(--shadow);
        }

        /* Header */
        .header {
            padding: 1.5rem 2rem;
            background: var(--shl-blue);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .header-logo {
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* Chat Window */
        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            line-height: 1.5;
            position: relative;
        }

        .message-user {
            align-self: flex-end;
            background-color: var(--shl-blue);
            color: var(--white);
            border-bottom-right-radius: 2px;
        }

        .message-assistant {
            align-self: flex-start;
            background-color: var(--shl-light-blue);
            color: var(--text-dark);
            border-bottom-left-radius: 2px;
            white-space: pre-wrap;
        }

        /* Recommendations */
        .recommendation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
            width: 100%;
        }

        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .card-name {
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--shl-blue);
        }

        .card-type {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            letter-spacing: 0.5px;
        }

        .card-link {
            display: inline-flex;
            align-items: center;
            color: var(--shl-blue);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        .card-link svg {
            margin-left: 0.25rem;
        }

        /* Input Area */
        .input-area {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            background: var(--white);
            display: flex;
            gap: 1rem;
        }

        .input-field {
            flex: 1;
            padding: 0.875rem 1.25rem;
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: var(--shl-blue);
        }

        .send-btn {
            background: var(--shl-blue);
            color: var(--white);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading */
        .typing {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_URL = 'http://localhost:8001'; // Matches our uvicorn port

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const chatEndRef = useRef(null);

            const scrollToBottom = () => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            // Initialize conversation on mount
            useEffect(() => {
                const initChat = async () => {
                    setLoading(true);
                    try {
                        const response = await fetch(`${API_URL}/chat`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ messages: [] })
                        });
                        const data = await response.json();
                        setMessages([{ role: 'assistant', content: data.reply, recommendations: data.recommendations }]);
                    } catch (error) {
                        console.error('Failed to init:', error);
                        setMessages([{ role: 'assistant', content: "I'm having trouble connecting to the SHL Advisor service. Please ensure the backend is running.", recommendations: [] }]);
                    } finally {
                        setLoading(false);
                    }
                };
                initChat();
            }, []);

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || loading) return;

                const userMsg = { role: 'user', content: input };
                const newHistory = [...messages.map(m => ({ role: m.role, content: m.content })), userMsg];
                
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setLoading(true);

                try {
                    const response = await fetch(`${API_URL}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: newHistory })
                    });
                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'assistant', content: data.reply, recommendations: data.recommendations }]);
                } catch (error) {
                    console.error('Chat error:', error);
                    setMessages(prev => [...prev, { role: 'assistant', content: "Sorry, I encountered an error processing your request.", recommendations: [] }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
                    <header className="header">
                        <div className="header-logo">SHL ADVISOR</div>
                        <div style={{ fontSize: '0.8rem', opacity: 0.8 }}>v1.0.0</div>
                    </header>

                    <main className="chat-window">
                        {messages.map((msg, idx) => (
                            <div key={idx} style={{ display: 'flex', flexDirection: 'column', width: '100%' }}>
                                <div className={`message message-${msg.role}`}>
                                    {msg.content}
                                </div>
                                {msg.recommendations && msg.recommendations.length > 0 && (
                                    <div className="recommendation-grid">
                                        {msg.recommendations.map((rec, rIdx) => (
                                            <div key={rIdx} className="card">
                                                <div>
                                                    <div className="card-type">{rec.test_type}</div>
                                                    <div className="card-name">{rec.name}</div>
                                                </div>
                                                <a href={rec.url} target="_blank" className="card-link">
                                                    View Details 
                                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                                                </a>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ))}
                        {loading && <div className="typing">SHL Advisor is thinking...</div>}
                        <div ref={chatEndRef} />
                    </main>

                    <form className="input-area" onSubmit={handleSend}>
                        <input 
                            type="text" 
                            className="input-field" 
                            placeholder="Type role requirements or questions..." 
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            disabled={loading}
                        />
                        <button type="submit" className="send-btn" disabled={loading}>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
